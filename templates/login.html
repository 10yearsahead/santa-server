<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Santa Admin</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #1e1e1e; padding: 2rem; border-radius: 8px; width: 320px; }
    h2 { text-align: center; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 0.6rem; margin: 0.4rem 0 1rem; background: #2a2a2a; border: 1px solid #444; color: #eee; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 0.7rem; background: #e63946; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .error { color: #e63946; font-size: 0.9rem; text-align: center; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🎅 Santa Admin</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="text" name="username" placeholder="Usuário" required>
      <input type="password" name="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
